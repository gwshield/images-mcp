name: Publish to npm

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Get npm publish token (Trusted Publishing OIDC)
        id: npm-token
        run: |
          OIDC=$(curl -fsSL \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://registry.npmjs.org/" \
            | jq -r .value)
          if [ -z "$OIDC" ] || [ "$OIDC" = "null" ]; then
            echo "ERROR: Failed to get OIDC token from GitHub" >&2
            exit 1
          fi
          RESPONSE=$(curl -sSL -w "\nHTTP_STATUS:%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d "{\"token\":\"${OIDC}\"}" \
            "https://registry.npmjs.org/-/npm/v1/oidc/token")
          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")
          TOKEN=$(echo "$BODY" | jq -r '.token // empty')
          if [ -z "$TOKEN" ]; then
            echo "ERROR: Token exchange failed (HTTP $HTTP_STATUS): $(echo "$BODY" | jq -r '.')" >&2
            exit 1
          fi
          echo "::add-mask::${TOKEN}"
          echo "npm-token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ steps.npm-token.outputs.npm-token }}
