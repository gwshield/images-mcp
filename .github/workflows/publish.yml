name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions: read-all

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest

    permissions:
      contents: write    # create GitHub Release and upload signed assets
      id-token: write    # OIDC for npm provenance + cosign keyless signing

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Publish to npm
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm show "${PACKAGE_NAME}@${PACKAGE_VERSION}" version &>/dev/null; then
            echo "Version ${PACKAGE_VERSION} is already published on npm, skipping."
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1
        with:
          cosign-release: "v3.0.5"

      - name: Pack and sign release artifact
        id: artifact
        run: |
          TARBALL=$(npm pack)
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          cosign sign-blob --yes \
            --output-signature="${TARBALL}.sig" \
            --output-certificate="${TARBALL}.pem" \
            "${TARBALL}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          TARBALL="${{ steps.artifact.outputs.tarball }}"
          if gh release view "${TAG}" --repo "${{ github.repository }}" &>/dev/null; then
            echo "Release ${TAG} already exists, uploading assets only."
            gh release upload "${TAG}" "${TARBALL}" "${TARBALL}.sig" "${TARBALL}.pem" \
              --repo "${{ github.repository }}" --clobber
          else
            gh release create "${TAG}" \
              --title "${TAG}" \
              --generate-notes \
              "${TARBALL}" "${TARBALL}.sig" "${TARBALL}.pem"
          fi
